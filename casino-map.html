  return L.divIcon({
    className: '',
    html: `<div style="width:28px;height:28px;background:${c.bg};border:2px solid ${c.border};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.6)"><div style="transform:rotate(45deg);font-size:11px;color:${c.text}">♠</div></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -30]
  });
}

const markers = {};

CASINOS.forEach(c => {
  const marker = L.marker([c.lat, c.lng], { icon: makeIcon(c.tier) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-name">${c.flag} ${c.name}</div>
      <div class="popup-addr">${c.address}</div>
      <div class="popup-open">${c.hours}</div>
    `, { maxWidth: 240 });

  marker.on('click', () => openDetail(c.id));
  markers[c.id] = marker;
});

// ── SIDEBAR LIST ───────────────────────────────────────────────────────────
let activeFilter = 'all';
let activeCard = null;

function renderList() {
  const list = document.getElementById('casino-list');
  list.innerHTML = '';
  const visible = CASINOS.filter(c => activeFilter === 'all' || c.region === activeFilter);
  visible.forEach(c => {
    const card = document.createElement('div');
    card.className = 'casino-card' + (activeCard === c.id ? ' active' : '');
    card.dataset.id = c.id;
    const badgeClass = c.tier === 'vip' ? 'badge-vip' : c.tier === 'mid' ? 'badge-mid' : 'badge-mass';
    const badgeLabel = c.tier === 'vip' ? 'High-Limit' : c.tier === 'mid' ? 'Mid-Range' : 'Mass';
    card.innerHTML = `
      <div class="card-flag-name">
        <span class="card-flag">${c.flag}</span>
        <span class="card-name">${c.name}</span>
        <span class="card-type-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="card-city">${c.city}</div>
    `;
    card.addEventListener('click', () => openDetail(c.id));
    list.appendChild(card);
  });
}

// ── DETAIL PANEL ───────────────────────────────────────────────────────────
function openDetail(id) {
  const c = CASINOS.find(x => x.id === id);
  if (!c) return;
  activeCard = id;
  renderList();

  map.flyTo([c.lat, c.lng], 13, { duration: 1.2 });
  markers[id].openPopup();

  const content = document.getElementById('detail-content');
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.name + ' ' + c.address)}`;
  content.innerHTML = `
    <div class="detail-name">${c.flag} ${c.name}</div>
    <div class="detail-city">${c.city}</div>
    <div class="detail-divider"></div>

    <div class="detail-section-label">Address</div>
    <div class="detail-val">${c.address}</div>

    <div class="detail-section-label">Phone</div>
    <div class="detail-val"><a href="tel:${c.phone.replace(/\s/g,'')}">${c.phone}</a></div>

    <div class="detail-section-label">Website</div>
    <div class="detail-val"><a href="https://${c.website}" target="_blank" rel="noopener">${c.website}</a></div>

    <div class="detail-section-label">Hours</div>
    <div class="detail-val">${c.hours}</div>

    <div class="detail-section-label">Baccarat Minimums</div>
    <div class="detail-val">${c.minBet}</div>

    <div class="detail-note">${c.note.replace(/<strong>/g,'<strong>').replace(/<\/strong>/g,'</strong>')}</div>

    <a href="${mapsUrl}" target="_blank" rel="noopener" class="directions-btn">Open in Google Maps ↗</a>
  `;

  document.getElementById('detail-panel').classList.add('open');
}

document.getElementById('detail-back').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  activeCard = null;
  renderList();
  map.flyTo([25, 10], 2, { duration: 1 });
});

// ── FILTERS ────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.filter;
    activeCard = null;
    renderList();

    const visible = CASINOS.filter(c => activeFilter === 'all' || c.region === activeFilter);
    if (visible.length > 0) {
      const bounds = L.latLngBounds(visible.map(c => [c.lat, c.lng]));
      map.flyToBounds(bounds.pad(0.3), { duration: 1 });
    }
  });
});

renderList();
</script>
</body>
</html>
