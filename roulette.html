<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Roulette — Baccarat Gladiator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#c9a84c;--gold-lt:#f0d080;--red:#cc2222;--felt:#020d06;}
body{background:var(--felt);color:#e8dfc0;font-family:'Raleway','Georgia',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:40px;}

/* Header */
.hdr{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(201,168,76,0.2);margin-bottom:4px;}
.hdr-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold-lt);letter-spacing:4px;}
.hdr-bal{font-family:'Cinzel',serif;font-size:0.82rem;color:var(--gold);}
.hdr-back{font-size:0.65rem;letter-spacing:2px;color:rgba(201,168,76,0.55);text-decoration:none;text-transform:uppercase;border:1px solid rgba(201,168,76,0.2);padding:4px 10px;border-radius:3px;}
.hdr-back:hover{color:var(--gold);border-color:rgba(201,168,76,0.5);}

/* Daily toast */
#daily-toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(4,26,14,0.97);border:1px solid var(--gold);border-radius:8px;padding:10px 22px;font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold-lt);text-align:center;z-index:100;opacity:0;transition:opacity 0.4s;pointer-events:none;letter-spacing:2px;white-space:nowrap;}
#daily-toast.show{opacity:1;}

/* Wheel */
#wheel-wrap{position:relative;margin:12px auto 8px;display:flex;justify-content:center;}
canvas{display:block;border-radius:50%;}

/* Result */
#result-panel{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;text-align:center;min-height:36px;margin:4px 0 8px;letter-spacing:3px;transition:color 0.3s;}

/* Chip row */
.chip-row{display:flex;gap:7px;margin:6px 0 10px;flex-wrap:wrap;justify-content:center;}
.chip-btn{font-family:'Cinzel',serif;font-size:0.7rem;padding:5px 14px;border-radius:20px;border:1px solid rgba(201,168,76,0.28);background:transparent;color:rgba(201,168,76,0.55);cursor:pointer;transition:all 0.18s;letter-spacing:1px;}
.chip-btn:hover,.chip-btn.active{background:rgba(201,168,76,0.14);border-color:var(--gold);color:var(--gold-lt);}

/* Bet section */
.bet-section{width:100%;max-width:560px;padding:0 12px;}
.bet-row{display:grid;gap:6px;margin-bottom:6px;}
.bet-row-2{grid-template-columns:1fr 1fr;}
.bet-row-3{grid-template-columns:1fr 1fr 1fr;}

.bet-btn{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:2px;padding:11px 6px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;text-align:center;transition:all 0.14s;background:rgba(0,0,0,0.38);color:rgba(232,223,192,0.65);user-select:none;}
.bet-btn:hover{border-color:rgba(201,168,76,0.45);background:rgba(201,168,76,0.06);}
.bet-btn.sel{border-color:var(--gold);background:rgba(201,168,76,0.14);color:var(--gold-lt);}
.bet-btn.rb{border-color:rgba(204,34,34,0.3);color:#ff8888;}
.bet-btn.rb.sel{border-color:#cc2222;background:rgba(204,34,34,0.14);}
.bet-btn.bb{border-color:rgba(180,180,180,0.18);color:#bbb;}
.bet-btn.bb.sel{border-color:#888;background:rgba(180,180,180,0.07);}
.bet-stake{font-size:0.6rem;color:var(--gold);margin-top:2px;}

/* Number grid */
.grid-label{font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:3px;color:rgba(201,168,76,0.45);text-align:center;margin:10px 0 5px;}
.num-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-bottom:6px;}
.nc{font-family:'Cinzel',serif;font-size:0.52rem;font-weight:700;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all 0.12s;padding:5px 0;min-width:0;aspect-ratio:1;}
.nc.rn{background:rgba(140,16,16,0.55);color:#ffbbbb;}
.nc.bn{background:rgba(28,28,28,0.75);color:#ccc;}
.nc.gn{background:rgba(18,110,35,0.65);color:#9fefb0;}
.nc:hover{border-color:var(--gold);transform:scale(1.12);}
.nc.nsel{border-color:var(--gold-lt);box-shadow:0 0 8px rgba(201,168,76,0.5);transform:scale(1.12);}
.nc .ns{font-size:0.42rem;color:var(--gold);line-height:1;margin-top:1px;}

/* Summary & spin */
#bets-summary{font-size:0.7rem;color:rgba(201,168,76,0.6);text-align:center;min-height:18px;margin:4px 0 8px;letter-spacing:1px;}
#btn-spin{font-family:'Cinzel',serif;font-size:0.88rem;letter-spacing:4px;padding:13px 50px;margin:4px 0 10px;background:linear-gradient(135deg,#f0d080,#c9a84c,#a07830);border:none;border-radius:4px;cursor:pointer;color:#000;font-weight:700;box-shadow:0 0 26px rgba(201,168,76,0.42),0 4px 16px rgba(0,0,0,0.7);transition:all 0.2s;}
#btn-spin:hover:not(:disabled){box-shadow:0 0 42px rgba(201,168,76,0.65),0 6px 22px rgba(0,0,0,0.8);}
#btn-spin:disabled{opacity:0.38;cursor:not-allowed;}

/* Payouts legend */
.payouts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0;font-size:0.62rem;color:rgba(232,223,192,0.35);letter-spacing:1px;}
</style>
</head>
<body>

<div class="hdr">
  <a class="hdr-back" href="baccarat-scoreboard.html">← Baccarat</a>
  <div class="hdr-title">🎰 ROULETTE</div>
  <div class="hdr-bal">💰 $<span id="bal-display">0</span></div>
</div>

<div id="daily-toast"></div>

<div id="wheel-wrap">
  <canvas id="rwheel" width="280" height="280"></canvas>
</div>

<div id="result-panel"></div>

<div class="chip-row">
  <button class="chip-btn active" onclick="selectChip(100,this)">$100</button>
  <button class="chip-btn" onclick="selectChip(500,this)">$500</button>
  <button class="chip-btn" onclick="selectChip(1000,this)">$1K</button>
  <button class="chip-btn" onclick="selectChip(5000,this)">$5K</button>
</div>

<div class="bet-section">
  <div class="bet-row bet-row-2">
    <button class="bet-btn rb" id="bet-red" onclick="toggleBet('red',this)">🔴 RED<div class="bet-stake" id="sk-red"></div></button>
    <button class="bet-btn bb" id="bet-black" onclick="toggleBet('black',this)">⚫ BLACK<div class="bet-stake" id="sk-black"></div></button>
  </div>
  <div class="bet-row bet-row-2">
    <button class="bet-btn" id="bet-odd" onclick="toggleBet('odd',this)">ODD<div class="bet-stake" id="sk-odd"></div></button>
    <button class="bet-btn" id="bet-even" onclick="toggleBet('even',this)">EVEN<div class="bet-stake" id="sk-even"></div></button>
  </div>
  <div class="bet-row bet-row-2">
    <button class="bet-btn" id="bet-low" onclick="toggleBet('low',this)">LOW &nbsp;1–18<div class="bet-stake" id="sk-low"></div></button>
    <button class="bet-btn" id="bet-high" onclick="toggleBet('high',this)">HIGH 19–36<div class="bet-stake" id="sk-high"></div></button>
  </div>

  <div class="grid-label">STRAIGHT NUMBER · 35:1 PAYOUT</div>
  <div class="num-grid" id="num-grid"></div>
</div>

<div class="payouts">
  <span>Red/Black · 1:1</span><span>·</span>
  <span>Odd/Even · 1:1</span><span>·</span>
  <span>High/Low · 1:1</span><span>·</span>
  <span>Straight · 35:1</span>
</div>

<div id="bets-summary">Place your bets</div>
<button id="btn-spin" onclick="spin()">SPIN</button>

<script>
// ── Constants ──────────────────────────────────────────────────────
const ECONOMY_KEY = 'bg_economy_v1';
const WHEEL = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const RED   = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const N = WHEEL.length;        // 37
const SEC = 2 * Math.PI / N;  // radians per sector

// ── State ──────────────────────────────────────────────────────────
let balance  = 1000;
let chipSize = 100;
let bets     = { red:0, black:0, odd:0, even:0, low:0, high:0, numbers:{} };
let spinning = false;
let wheelAngle = 0;
let ballAngle  = -Math.PI / 2;  // start at top
let ballRadius;

// ── Canvas setup ──────────────────────────────────────────────────
const canvas = document.getElementById('rwheel');
const ctx    = canvas.getContext('2d');
const CS     = canvas.width;
const CX = CS/2, CY = CS/2;
const WR     = CX - 6;   // outer wheel radius
const TRACK  = WR * 0.88; // ball orbit radius
const SETTLE = WR * 0.73; // ball settled radius
ballRadius   = TRACK;

// ── Economy ───────────────────────────────────────────────────────
function loadEconomy(){
  try{
    const p = JSON.parse(localStorage.getItem(ECONOMY_KEY) || '{}');
    if(Number.isFinite(+p.balance)) balance = Math.max(0, +p.balance);
  }catch(e){}
}
function saveEconomy(){
  try{
    const p = JSON.parse(localStorage.getItem(ECONOMY_KEY) || '{}');
    p.balance = balance;
    localStorage.setItem(ECONOMY_KEY, JSON.stringify(p));
  }catch(e){}
}
function updateBal(){
  document.getElementById('bal-display').textContent = balance.toLocaleString();
}

function checkDailyBonus(){
  try{
    const p    = JSON.parse(localStorage.getItem(ECONOMY_KEY) || '{}');
    const today = new Date().toISOString().slice(0,10);
    if(p.lastRouletteClaim === today) return;
    const bonus = 500;
    balance += bonus;
    p.balance = balance;
    p.lastRouletteClaim = today;
    localStorage.setItem(ECONOMY_KEY, JSON.stringify(p));
    updateBal();
    const t = document.getElementById('daily-toast');
    t.textContent = '🎰 Daily Roulette Bonus: +$500 chips!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }catch(e){}
}

// ── Wheel colors ──────────────────────────────────────────────────
function sectorFill(n){
  if(n === 0) return '#165c22';
  return RED.has(n) ? '#8f1212' : '#141414';
}

// ── Draw wheel ────────────────────────────────────────────────────
function drawWheel(wA, bA, bR){
  ctx.clearRect(0, 0, CS, CS);

  // Outer gold ring
  ctx.beginPath(); ctx.arc(CX, CY, WR+5, 0, 2*Math.PI);
  const gr = ctx.createLinearGradient(0, 0, CS, CS);
  gr.addColorStop(0,'#f5e090'); gr.addColorStop(0.5,'#c9a84c'); gr.addColorStop(1,'#7a5820');
  ctx.strokeStyle = gr; ctx.lineWidth = 9; ctx.stroke();

  // Sectors
  for(let i = 0; i < N; i++){
    const n   = WHEEL[i];
    const sa  = wA + i * SEC - Math.PI/2;
    const ea  = sa + SEC;
    ctx.beginPath(); ctx.moveTo(CX, CY); ctx.arc(CX, CY, WR, sa, ea); ctx.closePath();
    ctx.fillStyle = sectorFill(n); ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.3)'; ctx.lineWidth = 0.5; ctx.stroke();

    // Number label
    const mid = sa + SEC/2;
    const tr  = WR * 0.77;
    const tx  = CX + Math.cos(mid)*tr, ty = CY + Math.sin(mid)*tr;
    ctx.save();
    ctx.translate(tx, ty); ctx.rotate(mid + Math.PI/2);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 7.5px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n, 0, 0);
    ctx.restore();
  }

  // Ball track groove
  ctx.beginPath(); ctx.arc(CX, CY, TRACK, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 5; ctx.stroke();

  // Separator ring (inner edge)
  ctx.beginPath(); ctx.arc(CX, CY, WR*0.55, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(201,168,76,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Hub
  const hR = WR * 0.13;
  const hg = ctx.createRadialGradient(CX-2, CY-2, 1, CX, CY, hR);
  hg.addColorStop(0,'#f5e090'); hg.addColorStop(1,'#6b4a0a');
  ctx.beginPath(); ctx.arc(CX, CY, hR, 0, 2*Math.PI);
  ctx.fillStyle = hg; ctx.fill();
  ctx.strokeStyle = 'rgba(201,168,76,0.7)'; ctx.lineWidth = 1.2; ctx.stroke();

  // Pointer triangle (fixed at top)
  ctx.save();
  ctx.fillStyle = '#f0d080';
  ctx.shadowColor = 'rgba(201,168,76,0.8)'; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(CX, CY - WR - 1);
  ctx.lineTo(CX - 7, CY - WR + 12);
  ctx.lineTo(CX + 7, CY - WR + 12);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Ball
  const bx = CX + Math.cos(bA) * bR;
  const by = CY + Math.sin(bA) * bR;
  const bg2 = ctx.createRadialGradient(bx-2, by-2, 1, bx, by, 5.5);
  bg2.addColorStop(0,'#fff'); bg2.addColorStop(1,'#bbb');
  ctx.beginPath(); ctx.arc(bx, by, 5.5, 0, 2*Math.PI);
  ctx.fillStyle = bg2; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();
}

// ── Number grid ───────────────────────────────────────────────────
function buildGrid(){
  const g = document.getElementById('num-grid');
  // Zero spans first 2 cols
  const z = document.createElement('div');
  z.className = 'nc gn'; z.style.gridColumn = '1/3';
  z.style.aspectRatio = 'unset'; z.style.padding = '5px 0';
  z.textContent = '0'; z.dataset.n = '0';
  z.onclick = () => toggleNum(0, z);
  g.appendChild(z);
  for(let i = 1; i <= 36; i++){
    const c = document.createElement('div');
    c.className = 'nc ' + (RED.has(i) ? 'rn' : 'bn');
    c.textContent = i; c.dataset.n = i;
    c.onclick = () => toggleNum(i, c);
    g.appendChild(c);
  }
}

function toggleNum(n, el){
  if(spinning) return;
  if(bets.numbers[n] !== undefined){
    delete bets.numbers[n];
    el.classList.remove('nsel');
    const s = el.querySelector('.ns'); if(s) s.remove();
  } else {
    bets.numbers[n] = chipSize;
    el.classList.add('nsel');
    const s = document.createElement('div');
    s.className = 'ns'; s.textContent = '$'+chipSize; el.appendChild(s);
  }
  updateSummary();
}

// ── Chip / bet controls ───────────────────────────────────────────
function selectChip(v, btn){
  chipSize = v;
  document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleBet(type, btn){
  if(spinning) return;
  if(bets[type]){
    bets[type] = 0;
    btn.classList.remove('sel');
    document.getElementById('sk-'+type).textContent = '';
  } else {
    bets[type] = chipSize;
    btn.classList.add('sel');
    document.getElementById('sk-'+type).textContent = '$'+chipSize.toLocaleString();
  }
  updateSummary();
}

function totalBet(){
  let t = 0;
  ['red','black','odd','even','low','high'].forEach(k => t += bets[k]||0);
  Object.values(bets.numbers).forEach(v => t += v);
  return t;
}

function updateSummary(){
  const t = totalBet();
  const el = document.getElementById('bets-summary');
  el.textContent = t > 0
    ? `Total bet: $${t.toLocaleString()}  ·  Balance: $${balance.toLocaleString()}`
    : 'Place your bets';
}

// ── Wheel angle for a winning number ──────────────────────────────
// We want sector[idx] center to sit under the pointer (-π/2)
// Sector center at angle: wA + idx*SEC - π/2 + SEC/2  =>  set = -π/2
function targetAngle(num){
  const idx = WHEEL.indexOf(num);
  return -(idx * SEC + SEC/2);
}

// ── Spin ──────────────────────────────────────────────────────────
function spin(){
  if(spinning) return;
  const total = totalBet();
  if(total <= 0){ flash('Place a bet first!'); return; }
  if(total > balance){ flash('Not enough chips!'); return; }

  balance -= total;
  updateBal(); saveEconomy();

  spinning = true;
  document.getElementById('btn-spin').disabled = true;
  document.getElementById('result-panel').textContent = '';

  // Pick winner
  const winner = WHEEL[Math.floor(Math.random() * N)];
  const tAngle = targetAngle(winner);
  const extraSpins = 5 + Math.random() * 3;  // 5–8 full rotations
  const finalWheel = tAngle - extraSpins * 2 * Math.PI;

  // Ball goes opposite direction
  const ballStart  = ballAngle;
  const ballSpins  = 7 + Math.random() * 4;
  // Ball ends at top (-π/2), approaching from counter-clockwise
  const ballTarget = ballAngle - ballSpins * 2 * Math.PI;
  // Adjust so it truly ends at -π/2
  const exactEnd   = -Math.PI/2;
  const ballFinal  = ballTarget + (exactEnd - (ballTarget % (2*Math.PI) + 2*Math.PI) % (2*Math.PI));

  const dur     = 4800 + Math.random() * 800;
  const t0      = performance.now();
  const wStart  = wheelAngle;

  function ease(t){ return 1 - Math.pow(1 - t, 3); }

  function frame(now){
    const elapsed = now - t0;
    const t = Math.min(elapsed / dur, 1);
    const e = ease(t);

    wheelAngle = wStart + (finalWheel - wStart) * e;

    // Ball: faster deceleration, settles in last 20% of animation
    const bt = Math.min(elapsed / (dur * 0.82), 1);
    const be = ease(bt);
    ballAngle  = ballStart + (ballFinal - ballStart) * be;
    // Ball radius: stays on track until 75%, then falls inward
    ballRadius = TRACK - (TRACK - SETTLE) * Math.max(0, (t - 0.72) / 0.28);

    drawWheel(wheelAngle, ballAngle, ballRadius);

    if(t < 1){
      requestAnimationFrame(frame);
    } else {
      wheelAngle = finalWheel; ballAngle = -Math.PI/2; ballRadius = SETTLE;
      drawWheel(wheelAngle, ballAngle, ballRadius);
      finishSpin(winner, total);
    }
  }
  requestAnimationFrame(frame);
}

function finishSpin(winner, total){
  spinning = false;
  document.getElementById('btn-spin').disabled = false;

  const isRed  = RED.has(winner);
  const isBk   = winner !== 0 && !RED.has(winner);
  const isOdd  = winner !== 0 && winner % 2 === 1;
  const isEven = winner !== 0 && winner % 2 === 0;
  const isLow  = winner >= 1 && winner <= 18;
  const isHigh = winner >= 19 && winner <= 36;

  let winnings = 0;
  if(bets.red   && isRed)  winnings += bets.red   * 2;
  if(bets.black && isBk)   winnings += bets.black * 2;
  if(bets.odd   && isOdd)  winnings += bets.odd   * 2;
  if(bets.even  && isEven) winnings += bets.even  * 2;
  if(bets.low   && isLow)  winnings += bets.low   * 2;
  if(bets.high  && isHigh) winnings += bets.high  * 2;
  if(bets.numbers[winner]) winnings += bets.numbers[winner] * 36;

  balance += winnings;
  saveEconomy(); updateBal();

  const rp = document.getElementById('result-panel');
  const colorLabel = winner === 0 ? ' 🟢' : isRed ? ' 🔴' : ' ⚫';
  if(winnings > 0){
    const profit = winnings - total;
    rp.textContent = winner + colorLabel + (profit > 0 ? `  +$${profit.toLocaleString()}` : '  Break even');
    rp.style.color = '#80ff80';
  } else {
    rp.textContent = winner + colorLabel + `  −$${total.toLocaleString()}`;
    rp.style.color = '#ff8080';
  }

  // Clear all bets
  bets = { red:0, black:0, odd:0, even:0, low:0, high:0, numbers:{} };
  document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('sel'));
  ['red','black','odd','even','low','high'].forEach(k => { document.getElementById('sk-'+k).textContent=''; });
  document.querySelectorAll('.nc').forEach(c => { c.classList.remove('nsel'); const s=c.querySelector('.ns'); if(s)s.remove(); });
  updateSummary();

  // Chip top-up if broke
  if(balance < 100){
    setTimeout(() => {
      balance += 1000;
      saveEconomy(); updateBal();
      flash('Balance low — +$1,000 chips added!');
    }, 1200);
  }
}

function flash(msg){
  const t = document.getElementById('daily-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Init ──────────────────────────────────────────────────────────
loadEconomy();
updateBal();
buildGrid();
drawWheel(wheelAngle, ballAngle, TRACK);
checkDailyBonus();
</script>
</body>
</html>
