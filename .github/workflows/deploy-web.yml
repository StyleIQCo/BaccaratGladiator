name: Deploy Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject runtime config
        run: |
          cat > config.js << EOF
          window.BG_CONFIG = {
            apiBaseUrl: '${{ secrets.API_BASE_URL }}',
            cognitoDomain: '${{ secrets.COGNITO_DOMAIN }}',
            userPoolClientId: '${{ secrets.COGNITO_CLIENT_ID }}',
            redirectUri: '${{ secrets.REDIRECT_URI }}'
          };
          EOF
          # Also inject into www/index.html for Capacitor builds
          cp config.js www/config.js

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude ".git/*" \
            --exclude ".claude/*" \
            --exclude "node_modules/*" \
            --exclude "android/*" \
            --exclude "ios/*" \
            --exclude "*.keystore" \
            --exclude "*.jks" \
            --exclude "*.p8" \
            --exclude "*.pdf" \
            --exclude "*.docx" \
            --exclude "*.pptx" \
            --exclude "Apple_Developer*" \
            --delete

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
