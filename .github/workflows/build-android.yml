name: Build Android AAB

on:
  push:
    branches: [androidstore]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Inject runtime config
        run: |
          cat > config.js << EOF
          window.BG_CONFIG = {
            apiBaseUrl: '${{ secrets.API_BASE_URL }}',
            cognitoDomain: '${{ secrets.COGNITO_DOMAIN }}',
            userPoolClientId: '${{ secrets.COGNITO_CLIENT_ID }}',
            redirectUri: 'https://www.baccaratgladiator.com/baccarat-scoreboard.html'
          };
          EOF
          cp config.js www/config.js

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build signed AAB
        working-directory: android
        env:
          KEYSTORE_PATH: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: baccarat-gladiator-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
